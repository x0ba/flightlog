name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flightlog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d flightlog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flightlog
      FLIGHTLOG_KEYS_SECRET: ci-test-keys-secret
      PUBLIC_POSTHOG_PROJECT_TOKEN: ci-test-posthog-token
      PUBLIC_POSTHOG_HOST: https://us.i.posthog.com

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:push -- --force
      - run: bun run check
      - run: bun run test
      - run: bun run lint
